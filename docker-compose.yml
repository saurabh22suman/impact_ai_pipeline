services:
  engine:
    image: golang:1.25
    working_dir: /app
    volumes:
      - ./:/app
      - engine_outputs:/data/outputs
    command: ["go", "run", "./cmd/api"]
    env_file:
      - .env
    environment:
      STORAGE_MODE: file
      FILE_STORE_DIR: /data/outputs
      API_PORT: 8080
    restart: unless-stopped

  scheduler:
    image: golang:1.25
    working_dir: /app
    volumes:
      - ./:/app
    command: ["go", "run", "./cmd/scheduler"]
    env_file:
      - .env
    environment:
      SCHEDULER_API_BASE_URL: http://engine:8080
    depends_on:
      - engine
    restart: unless-stopped

  frontend:
    image: nginx:1.27-alpine
    ports:
      - "${FRONTEND_PORT:-18080}:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/styles.css:/usr/share/nginx/html/styles.css:ro
      - ./frontend/app.js:/usr/share/nginx/html/app.js:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - engine
    restart: unless-stopped

volumes:
  engine_outputs:
