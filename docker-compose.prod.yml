services:
  engine:
    image: golang:1.25
    working_dir: /app
    command: ["go", "run", "./cmd/api"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      STORAGE_MODE: ${STORAGE_MODE:-file}
      FILE_STORE_DIR: /data/outputs
      API_PORT: 8080
      CONFIG_DIR: /app/configs
      MIMO_API_KEY: ${MIMO_API_KEY}
      MIMO_BASE_URL: ${MIMO_BASE_URL}
      MIMO_TIMEOUT_SECONDS: ${MIMO_TIMEOUT_SECONDS:-20}
      MIMO_MODEL: ${MIMO_MODEL}
    expose:
      - "8080"
    networks:
      - app-network
    volumes:
      - ./:/app
      - engine_outputs:/data/outputs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 120s

  scheduler:
    image: golang:1.25
    working_dir: /app
    command: ["go", "run", "./cmd/scheduler"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONFIG_DIR: /app/configs
      SCHEDULER_PROFILE: ${SCHEDULER_PROFILE:-cost_optimized}
      SCHEDULER_SOURCES: ${SCHEDULER_SOURCES}
      SCHEDULER_API_BASE_URL: http://engine:8080
      SCHEDULER_TIMEZONE: ${SCHEDULER_TIMEZONE:-Asia/Kolkata}
      SCHEDULER_DAILY_TIME: ${SCHEDULER_DAILY_TIME:-09:15}
    networks:
      - app-network
    volumes:
      - ./:/app
    depends_on:
      engine:
        condition: service_healthy

  frontend:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      engine:
        condition: service_healthy
    expose:
      - "80"
    networks:
      - app-network
      - dokploy-network
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/styles.css:/usr/share/nginx/html/styles.css:ro
      - ./frontend/app.js:/usr/share/nginx/html/app.js:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  engine_outputs:

networks:
  app-network:
    driver: bridge
  dokploy-network:
    external: true
